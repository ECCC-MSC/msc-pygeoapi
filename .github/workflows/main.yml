name: build ⚙️

on: [push, pull_request]

jobs:
  lint:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.10"
      - uses: astral-sh/setup-uv@v7
      - name: Install dev dependencies
        run: uv sync --only-dev
      - name: Run flake8
        run: uv run flake8

  test:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6
      - name: Install system dependencies 📦
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential devscripts dh-python \
            fakeroot debhelper python3-all software-properties-common
          sudo add-apt-repository ppa:ubuntugis/ppa
          sudo apt-get update
          sudo apt-get install -y libgdal-dev
      - uses: actions/setup-python@v6
        with:
          python-version: "3.10"
      - uses: astral-sh/setup-uv@v7
      - name: Install GDAL Python binding
        run: uv pip install --system gdal==$(gdal-config --version)
      - name: Install dependencies
        run: uv sync
      - name: Run tests ⚙️
        run: |
          uv run pytest -k test_loader
          uv run pytest tests/test_openapi_document.py

  debian:
    runs-on: ubuntu-22.04
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v6
      - name: Install system dependencies 📦
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential devscripts dh-python \
            fakeroot debhelper python3-all software-properties-common
          sudo add-apt-repository ppa:ubuntugis/ppa
          sudo apt-get update
          sudo apt-get install -y libgdal-dev
      - name: Build Debian package 🏗️
        run: sudo debuild -b -uc -us
